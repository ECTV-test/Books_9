<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Book Reader Prototype</title>
  <link rel="stylesheet" href="css/styles.css?v=12">
  <link rel="stylesheet" href="css/theme.css?v=3">
  <style>
    .appTopBar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px;
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      backdrop-filter: blur(18px) saturate(120%);
      background: rgba(255,255,255,.72);
      border-bottom: 1px solid rgba(20,24,28,.08);
      margin: 0 calc(-1 * max(18px, calc((100vw - 1120px) / 2 + 18px)));
      padding-left: max(18px, calc((100vw - 1120px) / 2 + 18px));
      padding-right: max(18px, calc((100vw - 1120px) / 2 + 18px));
    }
    [data-theme="night"] .appTopBar {
      background: rgba(11,18,32,.55);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .appTopBarLeft { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .appTopBarRight { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .appTopBtn {
      width: 40px; height: 40px; border-radius: 12px; border: none;
      background: rgba(0,0,0,.06); color: var(--text);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    [data-theme="night"] .appTopBtn { background: rgba(255,255,255,.10); }
    /* Табы всегда в топбаре, выравнивание по baseline */
    .appTopTabs { display: flex; align-items: baseline; gap: 14px; overflow: hidden; }
    .appTopTabs .tab {
      font-size: 26px; line-height: 1; font-weight: 900; letter-spacing: -.01em;
      background: none; border: none; padding: 2px 0; cursor: pointer;
      color: var(--text); white-space: nowrap;
    }
    .appTopTabs .tab.muted { color: rgba(54,53,53,.38); }
    [data-theme="night"] .appTopTabs .tab.muted { color: rgba(255,255,255,.32); }
    /* Убираем большой appHeader */
    .appHeader { display: none !important; }
    .readTopBar { left: 0; right: 0; box-sizing: border-box; }
    .readTopBar .topIcon {
      width: 40px; height: 40px; border-radius: 12px; border: none;
      background: rgba(0,0,0,.06); color: var(--text);
      display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    }
    [data-theme="night"] .readTopBar .topIcon { background: rgba(255,255,255,.10); }
    .readTopBar .rtLeft, .readTopBar .rtRight { display: flex; align-items: center; gap: 6px; }
    .detailsTop {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; margin: 0 -18px 12px -18px;
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      backdrop-filter: blur(18px) saturate(120%);
      background: rgba(255,255,255,.72);
      border-bottom: 1px solid rgba(20,24,28,.08);
    }
    [data-theme="night"] .detailsTop { background: rgba(11,18,32,.55); border-bottom: 1px solid rgba(255,255,255,.08); }
    .detailsTop .iconBtn { background: rgba(0,0,0,.06); border-radius: 12px; }
    [data-theme="night"] .detailsTop .iconBtn { background: rgba(255,255,255,.10); }
    /* playerBar — единый frosted glass как везде */
    .playerBar {
      -webkit-backdrop-filter: blur(18px) saturate(120%) !important;
      backdrop-filter: blur(18px) saturate(120%) !important;
      background: rgba(255,255,255,.72) !important;
      border-top: 1px solid rgba(20,24,28,.08) !important;
    }
    [data-theme="night"] .playerBar {
      background: rgba(11,18,32,.55) !important;
      border-top: 1px solid rgba(255,255,255,.08) !important;
    }
    .playerBar .iconBtn { background: rgba(0,0,0,.06) !important; border-radius: 12px !important; color: var(--text) !important; }
    [data-theme="night"] .playerBar .iconBtn { background: rgba(255,255,255,.10) !important; }
    [data-theme="night"] .readerStage .paper { background: transparent !important; box-shadow: none !important; border: none !important; border-radius: 0 !important; }
    [data-theme="night"] .readerStage .paperInner { background: transparent !important; }
    [data-theme="night"] .pageBgRow { display: none !important; }
    .listenPaper { font-family: ui-serif, Georgia, "Times New Roman", Times, serif; }
    .listenPaper .listenList { padding: 0; }
    .listenPaper .listenLine .para { font-family: ui-serif, Georgia, "Times New Roman", Times, serif; }
    .popMiniBtns { display: flex; gap: 8px; align-items: center; }
    #popBookmark svg, #popSpeak svg { display: block; }
    /* User menu dropdown */
    .userMenuDropdown {
      position: fixed;
      z-index: 1200;
      background: rgba(255,255,255,.88);
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      backdrop-filter: blur(18px) saturate(120%);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      padding: 8px 0;
      min-width: 210px;
      max-width: 260px;
    }
    [data-theme="night"] .userMenuDropdown {
      background: rgba(15,26,47,.92);
      border-color: rgba(255,255,255,.10);
    }
    .umSection { padding: 8px 16px 6px; }
    .umLabel { font-size: 11px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .umLangRow { display: flex; gap: 6px; flex-wrap: wrap; }
    .umLangBtn {
      padding: 5px 10px; border-radius: 8px; border: 1.5px solid var(--line);
      background: var(--bg); color: var(--text); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .umLangBtn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .umFontRow { display: flex; align-items: center; gap: 8px; }
    .umFontBtn {
      width: 36px; height: 36px; border-radius: 9px; border: 1.5px solid var(--line);
      background: var(--bg); color: var(--text); font-size: 14px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .umFontVal { font-size: 14px; font-weight: 800; min-width: 44px; text-align: center; color: var(--text); }
    .umDivider { height: 1px; background: var(--line); margin: 4px 0; }
    /* bmBtn SVG alignment fix */
    .bmBtn { display:inline-flex; align-items:center; justify-content:center; }
  </style>
</head>
<body data-theme="light">
  <div id="app"></div>
  <div id="popover" class="popover" role="dialog" aria-hidden="true">
    <div class="popRow">
      <div class="popWord" id="popWord">word</div>
      <div class="popMiniBtns">
        <button class="miniBtn" id="popBookmark" title="Bookmark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h14a1 1 0 0 1 1 1v17l-8-4-8 4V4a1 1 0 0 1 1-1z"/></svg></button>
        <button class="miniBtn" id="popSpeak" title="Speak"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
      </div>
    </div>
    <div class="popTrans" id="popTrans">translation</div>
    <div class="popActions"><button class="popPlay" id="popPlayFromHere">Play from here</button></div>
  </div>
  <div id="sheetBackdrop" class="sheetBackdrop" aria-hidden="true"></div>
  <div id="settings" class="sheet" aria-hidden="true">
    <div class="sheetHandle" aria-hidden="true"></div>
    <div class="setHead"><div class="setTitle">&#x2699;&#xFE0F; Settings</div><button class="miniBtn" id="setClose">&#x2715;</button></div>
    <div class="sheetTabs" role="tablist"><button class="sheetTab active" id="setTabRead" role="tab">Text</button><button class="sheetTab" id="setTabListen" role="tab">Audio</button></div>
    <div id="setPaneRead" class="sheetPane" role="tabpanel">
      <div class="row"><div><div><b id="uiLangLabel">Interface language</b></div><small id="uiLangHint"></small></div><select id="uiLangSelect"><option value="en">English</option><option value="uk">&#1059;&#1082;&#1088;&#1072;&#1111;&#1085;&#1089;&#1100;&#1082;&#1072;</option><option value="ru">&#1056;&#1091;&#1089;&#1089;&#1082;&#1080;&#1081;</option><option value="pl">Polski</option><option value="de">Deutsch</option><option value="es">Espa&#241;ol</option><option value="fr">Fran&#231;ais</option><option value="it">Italiano</option><option value="pt">Portugu&#234;s</option></select></div>
      <div class="row"><div><div><b>Translation language</b></div><small>LibreTranslate</small></div><select id="targetLang"></select></div>
      <div class="row"><div><div><b>Text size</b></div><small>A&#8722; / A+</small></div><div class="seg"><button id="fontMinus">A&#8722;</button><button id="fontPlus">A+</button></div></div>
      <div class="row"><div><div><b>Highlight color</b></div></div><div class="seg"><button id="hlDefault" class="active">Default</button><button id="hlYellow">Yellow</button></div></div>
      <div class="row pageBgRow"><div><div><b id="pageBgLabel">Background</b></div><small id="pageBgHint"></small></div><div class="pageBgSeg"><button class="pageBgBtn active" data-bg="auto">A</button><button class="pageBgBtn" data-bg="warm">&#9728;</button><button class="pageBgBtn" data-bg="white">W</button></div></div>
      <div class="row" id="rowTapTranslate"><div><div><b>Translation</b></div><small>on tap</small></div><div class="toggle on" id="tTranslation"><div class="knob"></div></div></div>
      <div class="row" id="rowLineTranslate" style="display:none"><div><div><b>Line translation</b></div></div><div class="toggle on" id="tLineTranslation"><div class="knob"></div></div></div>
      <div class="row"><div><div><b>Theme</b></div><small>night mode</small></div><div class="toggle" id="tNight"><div class="knob"></div></div></div>
      <div class="row"><div><div><b>Highlight</b></div></div><div class="toggle on" id="tHighlight"><div class="knob"></div></div></div>
      <div class="row"><div><div><b>Swap languages</b></div></div><div class="toggle" id="tSwap"><div class="knob"></div></div></div>
    </div>
    <div id="setPaneListen" class="sheetPane" role="tabpanel" style="display:none">
      <div class="row"><div><div><b>Voice gender</b></div></div><div class="seg"><button id="uMale">Male</button><button id="uFemale">Female</button></div></div>
      <div class="row"><div><div><b>Speed</b></div><small id="speedLabel">1.0&#215;</small></div><div class="seg"><button id="uSpeedSlow">Slow</button><button id="uSpeedNormal">Normal</button><button id="uSpeedFast">Fast</button></div></div>
      <input id="speed" class="range" type="range" min="0.3" max="2.0" step="0.05" value="1.0" style="display:none">
    </div>
  </div>
  <div id="devPanel" class="sheet" aria-hidden="true">
    <div class="sheetHandle" aria-hidden="true"></div>
    <div class="setHead"><div class="setTitle">Dev</div><button class="miniBtn" id="devClose">&#x2715;</button></div>
    <div class="row"><div><div><b>Provider</b></div></div><div class="seg"><button id="provLibre">Libre</button><button id="provOpenAI">OpenAI</button></div></div>
    <div class="row"><div><div><b>Voice gender</b></div></div><div class="seg"><button id="vMale">M</button><button id="vFemale">F</button></div></div>
    <div class="row"><div><div><b>Voice</b></div></div><select id="ttsVoiceSelect"></select></div>
    <div class="row" style="align-items:flex-start"><div style="min-width:140px"><div><b>Prompt</b></div></div><textarea id="ttsInstructions" style="width:100%;min-height:86px;border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--card);color:var(--text);font-weight:700;resize:vertical"></textarea></div>
    <div class="row"><div><div><b>No cache</b></div></div><div class="toggle" id="tNoCache"><div class="knob"></div></div></div>
    <div class="ctaRow" style="margin-top:6px"><button class="btn btnGhost" id="btnClearTts">&#x1F9F9; TTS</button><button class="btn btnGhost" id="btnClearTr">&#x1F9F9; TR</button></div>
  </div>
  <div id="chaptersSheet" class="sheet" aria-hidden="true">
    <div class="sheetHandle" aria-hidden="true"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px 6px;"><div id="chaptersTitle" style="font-weight:900">Chapters</div><button class="btn" id="chaptersClose" style="padding:8px 12px">Close</button></div>
    <div id="chaptersList" style="padding:6px 12px 18px;display:flex;flex-direction:column;gap:8px;"></div>
  </div>
  <div id="player" class="playerBar" style="display:none">
    <div class="playerInner">
      <div><div class="progTop"><div class="progTitle" id="pTitle">Reader</div><div class="progMeta"><span id="pPct">0%</span></div></div><div class="bar"><div id="pFill"></div></div></div>
      <div class="controls">
        <button class="iconBtn" id="btnBack"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <button class="iconBtn" id="btnStart"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4v16M19 12L9 4v16l10-8z"/></svg></button>
        <button class="playBtn" id="btnPlay">&#x25B6;</button>
        <button class="iconBtn" id="btnChapters" title="Chapters"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="modeSwitch" id="modeSwitch">
          <button class="modeBtn" id="modeListen"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3a7 7 0 0 0-7 7v4a4 4 0 0 0 4 4h1V8H9a5 5 0 0 1 10 0h-1v10h1a4 4 0 0 0 4-4v-4a7 7 0 0 0-7-7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
          <button class="modeBtn" id="modeRead"><svg viewBox="0 0 24 24" fill="none"><path d="M7 4h10a2 2 0 0 1 2 2v13H7a2 2 0 0 0-2 2V6a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M7 4v15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/i18n.js?v=3"></script>
  <script src="js/config.js?v=2"></script>
  <script src="js/core.js?v=2"></script>
  <script src="js/progress.js?v=1"></script>
  <script src="js/bookmarks.js?v=1"></script>
  <script src="js/services/books.js?v=2"></script>
  <script src="js/services/translate.js?v=2"></script>
  <script src="js/services/tts.js?v=2"></script>
  <script src="js/views/catalog.js?v=12"></script>
  <script src="js/views/library.js?v=12"></script>
  <script src="js/views/details.js?v=3"></script>
  <script src="js/views/reader.js?v=4"></script>
  <script src="js/views/chapters.js?v=1"></script>
  <script src="js/app.js?v=8" defer></script>
  <script>
    // i18n live update — перерисовываем текущий экран при смене языка
    I18n.onUiLangChange(function(){
      try{
        var route = state && state.route;
        if(!route) return;
        var name = route.name;
        if(name === 'catalog') { renderCatalog(); }
        else if(name === 'library') { renderLibrary(); }
      }catch(e){}
    });
  </script>
</body>
</html>
